name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $versionData = node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')); if (pkg.version !== tauri.version) { console.error('package.json and src-tauri/tauri.conf.json versions do not match.'); process.exit(1); } const releaseVersion = pkg.releaseVersion || pkg.version; process.stdout.write(JSON.stringify({ version: pkg.version, releaseVersion }));"
          if (-not $versionData) {
            throw 'Failed to resolve release version.'
          }
          $versionJson = $versionData | ConvertFrom-Json
          "version=$($versionJson.version)" >> $env:GITHUB_OUTPUT
          "release_version=$($versionJson.releaseVersion)" >> $env:GITHUB_OUTPUT
          "tag=v$($versionJson.releaseVersion)" >> $env:GITHUB_OUTPUT

      - name: Skip if release already exists
        id: existing_release
        shell: pwsh
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $match = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to query remote tags.'
          }
          if ([string]::IsNullOrWhiteSpace($match)) {
            "exists=false" >> $env:GITHUB_OUTPUT
            Write-Host "No existing release tag found for $tag."
          } else {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "Release tag $tag already exists. Skipping release build."
          }

      - name: Set up Node.js
        if: steps.existing_release.outputs.exists != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        if: steps.existing_release.outputs.exists != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install WiX Toolset
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        run: choco install wixtoolset --yes --no-progress

      - name: Install frontend dependencies
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        run: npm ci

      - name: Restore runtime assets
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $hasHashes = Test-Path 'public/card-hashes.json'
          $hasModel = Test-Path 'public/models/yolo11n-obb-riftbound.onnx'
          $hasQuantizedModel = Test-Path 'public/models/yolo11n-obb-riftbound-q8.onnx'
          $cardImage = Get-ChildItem 'public/cards' -File -Filter *.webp -ErrorAction SilentlyContinue | Select-Object -First 1

          if ($hasHashes -and $hasModel -and $hasQuantizedModel -and $cardImage) {
            Write-Host 'Runtime assets are already present in the checkout.'
            exit 0
          }

          Write-Host 'Runtime assets are missing. Downloading runtime-assets.zip from the runtime-assets GitHub release.'
          gh release download runtime-assets --pattern runtime-assets.zip --dir "$env:RUNNER_TEMP" --repo "${{ github.repository }}"

          $archivePath = Join-Path $env:RUNNER_TEMP 'runtime-assets.zip'
          if (-not (Test-Path $archivePath)) {
            throw 'runtime-assets.zip was not downloaded.'
          }

          $extractPath = Join-Path $env:RUNNER_TEMP 'runtime-assets'
          if (Test-Path $extractPath) {
            Remove-Item $extractPath -Recurse -Force
          }

          Expand-Archive -Path $archivePath -DestinationPath $extractPath -Force

          New-Item -ItemType Directory -Path 'public' -Force | Out-Null

          $hashCandidates = @(
            (Join-Path $extractPath 'public/card-hashes.json'),
            (Join-Path $extractPath 'card-hashes.json')
          )
          $modelDirCandidates = @(
            (Join-Path $extractPath 'public/models'),
            (Join-Path $extractPath 'models')
          )
          $cardDirCandidates = @(
            (Join-Path $extractPath 'public/cards'),
            (Join-Path $extractPath 'cards')
          )

          $hashSource = $hashCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          $modelSource = $modelDirCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          $cardSource = $cardDirCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $hashSource) {
            throw 'card-hashes.json was not found in runtime-assets.zip.'
          }
          if (-not $modelSource) {
            throw 'models directory was not found in runtime-assets.zip.'
          }
          if (-not $cardSource) {
            throw 'cards directory was not found in runtime-assets.zip.'
          }

          Copy-Item $hashSource 'public/card-hashes.json' -Force
          Copy-Item $modelSource 'public/models' -Recurse -Force
          Copy-Item $cardSource 'public/cards' -Recurse -Force

      - name: Verify updater signing secret
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'TAURI_SIGNING_PRIVATE_KEY must be set so Tauri can sign updater artifacts.'
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw 'TAURI_SIGNING_PRIVATE_KEY_PASSWORD must be set for the configured updater signing key.'
          }

      - name: Build Windows installers
        if: steps.existing_release.outputs.exists != 'true'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD.Trim()
          npm run desktop:build

      - name: Resolve installer artifacts
        if: steps.existing_release.outputs.exists != 'true'
        id: installers
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:RUNNER_TEMP 'release-assets'
          if (Test-Path $releaseDir) {
            Remove-Item $releaseDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          $msi = Get-ChildItem 'src-tauri/target/release/bundle/msi' -File -Filter *.msi |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $msi) {
            throw 'MSI bundle was not produced.'
          }

          $nsis = Get-ChildItem 'src-tauri/target/release/bundle/nsis' -File -Filter *.exe |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $nsis) {
            throw 'NSIS bundle was not produced.'
          }

          $msiReleaseFileName = "Riftbound Scanner_${{ steps.version.outputs.release_version }}_x64_en-US.msi"
          $nsisReleaseFileName = "Riftbound Scanner_${{ steps.version.outputs.release_version }}_x64-setup.exe"
          $msiReleaseFilePath = Join-Path $releaseDir $msiReleaseFileName
          $nsisReleaseFilePath = Join-Path $releaseDir $nsisReleaseFileName

          Copy-Item $msi.FullName $msiReleaseFilePath -Force
          Copy-Item $nsis.FullName $nsisReleaseFilePath -Force

          $bundleRoot = 'src-tauri/target/release/bundle'
          $signedCandidates = Get-ChildItem $bundleRoot -Recurse -File |
            Where-Object {
              $_.Name -notlike '*.sig' -and
              ($_.Extension -in @('.exe', '.msi', '.zip')) -and
              (Test-Path "$($_.FullName).sig")
            }

          if (-not $signedCandidates) {
            throw 'No signed updater artifacts were produced. Check TAURI_SIGNING_PRIVATE_KEY and createUpdaterArtifacts.'
          }

          function Select-UpdaterArtifact {
            param(
              [Parameter(Mandatory = $true)] [object[]] $Candidates,
              [Parameter(Mandatory = $true)] [string] $Kind
            )

            $matches = $Candidates | Where-Object {
              if ($Kind -eq 'nsis') {
                $_.DirectoryName -match '[\\/]nsis($|[\\/])' -or $_.Name -like '*setup.exe*'
              } else {
                $_.DirectoryName -match '[\\/]msi($|[\\/])' -or $_.Name -like '*.msi' -or $_.Name -like '*.msi.zip'
              }
            }

            $matches |
              Sort-Object @{ Expression = { if ($_.Extension -eq '.zip') { 0 } else { 1 } } }, @{ Expression = 'LastWriteTime'; Descending = $true } |
              Select-Object -First 1
          }

          function Copy-UpdaterArtifact {
            param(
              [Parameter(Mandatory = $true)] [System.IO.FileInfo] $Artifact,
              [Parameter(Mandatory = $true)] [string] $Kind
            )

            if ($Kind -eq 'nsis') {
              $fileName = if ($Artifact.Extension -eq '.zip') {
                "Riftbound Scanner_${{ steps.version.outputs.release_version }}_x64-setup.exe.zip"
              } else {
                $nsisReleaseFileName
              }
            } else {
              $fileName = if ($Artifact.Extension -eq '.zip') {
                "Riftbound Scanner_${{ steps.version.outputs.release_version }}_x64_en-US.msi.zip"
              } else {
                $msiReleaseFileName
              }
            }

            $filePath = Join-Path $releaseDir $fileName
            Copy-Item $Artifact.FullName $filePath -Force
            Copy-Item "$($Artifact.FullName).sig" "$filePath.sig" -Force

            $signature = (Get-Content "$filePath.sig" -Raw -Encoding UTF8).Trim()
            $encodedName = [System.Uri]::EscapeDataString($fileName)
            [ordered]@{
              signature = $signature
              url = "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/$encodedName"
            }
          }

          $platforms = [ordered]@{}
          $nsisUpdater = Select-UpdaterArtifact -Candidates $signedCandidates -Kind 'nsis'
          $msiUpdater = Select-UpdaterArtifact -Candidates $signedCandidates -Kind 'msi'

          if ($nsisUpdater) {
            $nsisEntry = Copy-UpdaterArtifact -Artifact $nsisUpdater -Kind 'nsis'
            $platforms['windows-x86_64-nsis'] = $nsisEntry
            $platforms['windows-x86_64'] = $nsisEntry
          }

          if ($msiUpdater) {
            $msiEntry = Copy-UpdaterArtifact -Artifact $msiUpdater -Kind 'msi'
            $platforms['windows-x86_64-msi'] = $msiEntry
            if (-not $platforms.Contains('windows-x86_64')) {
              $platforms['windows-x86_64'] = $msiEntry
            }
          }

          if ($platforms.Count -eq 0) {
            throw 'No Windows updater platform entries could be generated.'
          }

          $latestJson = [ordered]@{
            version = '${{ steps.version.outputs.version }}'
            notes = 'See the GitHub release notes for this version.'
            pub_date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
            platforms = $platforms
          } | ConvertTo-Json -Depth 8
          Set-Content -Path (Join-Path $releaseDir 'latest.json') -Value $latestJson -Encoding UTF8

          "dir=$releaseDir" >> $env:GITHUB_OUTPUT
          "artifact_name=riftbound-installers-${{ steps.version.outputs.release_version }}" >> $env:GITHUB_OUTPUT
          "files=$releaseDir/*" >> $env:GITHUB_OUTPUT

      - name: Upload installer artifacts
        if: steps.existing_release.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.installers.outputs.artifact_name }}
          path: ${{ steps.installers.outputs.dir }}

      - name: Create GitHub release
        if: steps.existing_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: ${{ steps.installers.outputs.files }}
